<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Add Patient</title>
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <style>
        body {
            background-color: #f8f9fa;
        }
        .container {
            margin-top: 50px;
        }
    </style>
    
</head>
<body>
    <div class="container">
        <div class="card">
            <div class="card-header">
                <h3>Add Patient</h3>
            </div>
            <div class="card-body">
<form th:action="@{/patients/addPatientNutrition}" th:object="${patient}" method="post" id="patientForm">
                    <!-- حقول إدخال البيانات -->
                    <div class="form-group">
                        <label>File No:</label>
                        <input type="text" class="form-control" th:field="*{fileNo}" required  />
                    </div>
                    <div class="form-group">
            <label for="nameOfPatient">Name of Patient:</label>
            <input type="text" id="nameOfPatient" name="nameOfPatient" class="form-control" required  />
            <div id="error-message" class="error"></div>
        </div>
                    <div class="form-group">
                        <label>Age:</label>
                        <input type="number" class="form-control" th:field="*{age}"  required />
                    </div>
                    <div class="form-group">
                        <label>Room No:</label>
                        <input type="text" class="form-control" th:field="*{room}" required  />
                    </div>
                    <div class="form-group">
                        <label>Bed No:</label>
                        <input type="text" class="form-control" th:field="*{bed}" required  />
                    </div>
                    <div class="form-group">
                        <label>Diagnosis:</label>
                        <input type="text" class="form-control" th:field="*{diagnosis}" required  />
                    </div>
                    <div class="form-group">
                        <label>Diet Order:</label>
                        <input type="text" id="dietOrder" class="form-control" th:field="*{dietOrder}" oninput="updatePatternFeeds()" required />
                    </div>
                    <div class="form-group">
                        <label>Pattern Feeds:</label>
                        <div class="form-check">
                            <input type="checkbox" class="form-check-input" id="nor" th:field="*{patternFeeds}" value="N" /> N
                        </div>
                        <div class="form-check">
                            <input type="checkbox" class="form-check-input" id="chi" th:field="*{patternFeeds}" value="C" /> C
                        </div>
                        <div class="form-check">
                            <input type="checkbox" class="form-check-input" id="spe" th:field="*{patternFeeds}" value="S" /> S
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Admission Date:</label>
                        <input type="date" class="form-control" th:field="*{admissionDate}" required  />
                    </div>
                    <div class="form-group">
                        <label>Companion Name:</label>
                        <input type="text" id="companionName" name="companionName" class="form-control" required  />
                        <div id="companionName-error" class="error"></div>
                    </div>
                    <!-- زر الإرسال -->
                    <button type="submit" class="btn btn-primary">Add Patient</button>
                </form>
            </div>
        </div>
    </div>

    <script>
        function updatePatternFeeds() {
            var dietOrder = document.getElementById('dietOrder').value.toLowerCase();
            document.getElementById('nor').checked = dietOrder.includes('n');
            document.getElementById('chi').checked = dietOrder.includes('c');
            document.getElementById('spe').checked = dietOrder.includes('s');
        }
      
    </script>
    <script>
        document.getElementById("patientForm").addEventListener("submit", function(event) {
            var nameInput = document.getElementById("nameOfPatient").value.trim();
            var errorMessage = document.getElementById("error-message");

            // Regular expression to match names with 3 or 4 parts
            var namePattern = /^(\S+\s+){2,3}\S+$/;

            if (!namePattern.test(nameInput)) {
                errorMessage.textContent = "The patient's name must be three or four parts.";
                event.preventDefault(); // Prevent form submission
            } else {
                errorMessage.textContent = ""; // Clear error message
            }
        });
    </script>
    <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.9.2/dist/umd/popper.min.js"></script>
    <script src="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>
</body>
</html>
