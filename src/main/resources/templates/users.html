<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>قائمة المستخدمين</title>
    <!-- Cairo Font -->
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/css/bootstrap.min.css">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body {
            font-family: 'Cairo', sans-serif;
            background-color: #f8f9fa;
        }

        .table-container {
            margin: 20px auto;
            max-width: 90%;
            background-color: #ffffff;
            border-radius: 8px;
            box-shadow: 0px 4px 10px rgba(0, 0, 0, 0.1);
            padding: 20px;
        }

        .table th, .table td {
            text-align: center;
            vertical-align: middle;
        }

        .table th {
            background-color: #007bff;
            color: #ffffff;
            font-size: 18px;
        }

        .table td {
            font-size: 16px;
        }

        .btn-edit {
            color: #ffffff;
            background-color: #28a745;
        }

        .btn-delete {
            color: #ffffff;
            background-color: #dc3545;
        }

        .page-header {
            text-align: center;
            margin-bottom: 20px;
            font-weight: bold;
            font-size: 28px;
        }

        .search-bar {
            margin-bottom: 20px;
            max-width: 400px;
            text-align: center;
            margin-left: auto;
            margin-right: auto;
        }

        /* زر الرجوع - في منتصف الصفحة */
        .btn-back {
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 20px auto 0;
            color: #ffffff;
            background-color: #6c757d;
            border: none;
            border-radius: 25px;
            padding: 10px 20px;
            transition: all 0.2s ease;
            box-shadow: 0px 2px 5px rgba(0, 0, 0, 0.1);
            max-width: 150px;
        }

        .btn-back:hover {
            transform: scale(1.1);
            background-color: #555555;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="table-container">
            <h1 class="page-header">
                <i class="fas fa-users"></i> قائمة المستخدمين
            </h1>

            <!-- Search Bar -->
            <div class="search-bar">
                <input type="text" id="searchInput" class="form-control" placeholder="ابحث عن المستخدم..." onkeyup="searchTable()">
            </div>

            <!-- Users Table -->
            <table class="table table-striped table-hover">
                <thead>
                    <tr>
                        <th>اسم المستخدم</th>
                        <th>القسم</th>
                        <th>الإجراءات</th>
                    </tr>
                </thead>
                <tbody id="userTableBody">
                    <tr th:each="user : ${users}">
                        <td th:text="${user.username}"></td>
                        <td th:text="${user.department}"></td>
                        <td>
                            <!-- Edit Button -->
                            <a href="#" th:href="@{/patients/users/edit/{id}(id=${user.id})}" class="btn btn-edit">
                                <i class="fas fa-edit"></i> تعديل
                            </a>
                            <!-- Delete Button -->
                            <a href="#" th:href="@{/patients/users/delete/{id}(id=${user.id})}" class="btn btn-delete">
                                <i class="fas fa-trash"></i> حذف
                            </a>
                        </td>
                    </tr>
                </tbody>
            </table>

            <!-- زر الرجوع في المركز أسفل الجدول -->
            <button onclick="window.history.back()" class="btn-back">
                <i class="fas fa-arrow-left me-2"></i>
            </button>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Search Function -->
    <script>
        function searchTable() {
            let input = document.getElementById("searchInput").value.toLowerCase();
            let rows = document.getElementById("userTableBody").getElementsByTagName("tr");
            for (let i = 0; i < rows.length; i++) {
                let cells = rows[i].getElementsByTagName("td");
                let match = false;
                for (let j = 0; j < cells.length; j++) {
                    if (cells[j].innerText.toLowerCase().indexOf(input) > -1) {
                        match = true;
                        break;
                    }
                }
                rows[i].style.display = match ? "" : "none";
            }
        }
    </script>
</body>
</html>
