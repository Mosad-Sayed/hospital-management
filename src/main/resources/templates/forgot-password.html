<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password</title>
    <link rel="stylesheet" href="/assets/css/bootstrap.min.css">
	<style>
	          body.green-background {
	            background: url('') no-repeat center center fixed, linear-gradient(to right, #00C851, #7ccaa3); /* دمج الصورة مع اللون */
	                       background-size: 5px; /* تجعل الصورة تغطي الصفحة بالكامل */
	           
	            height: 100vh;
	            display: flex;
	            justify-content: center;
	            align-items: center;
	            font-family: 'Arial', sans-serif;
	            overflow: hidden;
	            position: relative;
	        }
	        
	         body.blue-background {
	            background: linear-gradient(to right, #0062E6, #33AEFF);
	                       background-size: 5px; /* تجعل الصورة تغطي الصفحة بالكامل */
	           
	            height: 100vh;
	            display: flex;
	            justify-content: center;
	            align-items: center;
	            font-family: 'Arial', sans-serif;
	            overflow: hidden;
	            position: relative;
	        }

	        .background-overlay {
	            position: absolute;
	            top: 0;
	            left: 0;
	            width: 100%;
	            height: 100%;
	            background: radial-gradient(circle, rgba(255, 255, 255, 0.3), rgba(0, 0, 0, 0.1));
	            opacity: 0.4;
	            pointer-events: none;
	            z-index: 0;
	        }

	        .circle {
	            position: absolute;
	            border-radius: 50%;
	            background: rgba(0, 0, 0, 0.2);
	            z-index: 0;
	            animation: moveCircle 25s infinite linear;
	        }

	        .circle1 {
	            width: 250px;
	            height: 250px;
	            top: -120px;
	            left: -120px;
	            animation-duration: 30s;
	            opacity: 0.4;
	        }

	        .circle2 {
	            width: 300px;
	            height: 300px;
	            bottom: -150px;
	            right: -150px;
	            animation-duration: 35s;
	            opacity: 0.5;
	        }

	        .circle3 {
	            width: 350px;
	            height: 350px;
	            top: 50%;
	            left: 50%;
	            transform: translate(-50%, -50%);
	            animation-duration: 40s;
	            opacity: 0.6;
	        }

	        @keyframes moveCircle {
	            0% { transform: translateY(0); }
	            50% { transform: translateY(30px); }
	            100% { transform: translateY(0); }
	        }

	        .container {
	            max-width: 400px;
	            background: rgba(255, 255, 255, 0.9);
	            padding: 30px;
	            border-radius: 15px;
	            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.2);
	            position: relative;
	            z-index: 1;
	            transform: scale(0.95);
	            transition: transform 0.3s ease, box-shadow 0.3s ease;
	        }

	        .container:hover {
	            transform: scale(1);
	            box-shadow: 0 12px 24px rgba(0, 0, 0, 0.3);
	        }

	        .form-control {
	            border-radius: 30px;
	            padding: 20px;
	            border: 1px solid #ddd;
	            transition: border-color 0.3s ease, box-shadow 0.3s ease;
	        }

	        .form-control:focus {
	            border-color: #007E33;
	            box-shadow: 0 0 0 0.2rem rgba(0, 126, 51, 0.25);
	        }

	        .btn-primary {
	            background-color: #007E33;
	            border: none;
	            border-radius: 30px;
	            padding: 10px 20px;
	            transition: background-color 0.3s ease, transform 0.3s ease;
	        }

	        .btn-primary:hover {
	            background-color: #005E25;
	            transform: translateY(-3px);
	        }

	        .spinner-border {
	            width: 3rem;
	            height: 3rem;
	            display: none;
	            margin: 20px auto;
	            color: red;
	            animation: spin 1s linear infinite;
	        }

	        @keyframes spin {
	            0% { transform: rotate(0deg); }
	            100% { transform: rotate(360deg); }
	        }

	        .icon {
	            font-size: 90px;
	            color: #007E33;
	            margin-bottom: 20px;
	            transition: transform 0.3s ease, color 0.3s ease;
	        }

	        .icon:hover {
	            transform: scale(1.1);
	            color: #005E25;
	        }

	        .form-group label {
	            font-weight: bold;
	        }

	        .form-group input::placeholder {
	            font-style: italic;
	        }
			.alert-custom {
			            position: absolute;
			            top: 20px; /* المسافة من أعلى الصفحة */
			            left: 50%;
			            transform: translateX(-50%);
			            width: 20%; /* العرض الإجمالي */
			            z-index: 1000; /* اجعلها فوق المحتوى */
						text-align:center;
						font-weight:bold;
						font-size:20px;
			        }
	    </style>
</head>
<body>
    <div class="container text-center">
        <h2 class="text-center mb-4">Reset Password</h2>
        <form th:action="@{/reset-password}" method="post">
            <div class="form-group">
                <label for="username">Username:</label>
                <input type="text" class="form-control" id="username" name="username" placeholder="Enter your username" required>
            </div>
            <div class="form-group">
                <label for="newPassword">New Password:</label>
                <input type="password" class="form-control" id="newPassword" name="newPassword" placeholder="Enter new password" required>
            </div>
            <div class="form-group">
                <label for="confirmPassword">Confirm Password:</label>
                <input type="password" class="form-control" id="confirmPassword" name="confirmPassword" placeholder="Confirm your new password" required>
            </div>
            <button type="submit" class="btn btn-primary">Reset Password</button>
        </form>
    </div>
</body>
</html>
