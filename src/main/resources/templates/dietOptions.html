<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Diet Options</title>
</head>
<body>

<div id="normalDietTable">
    <table class="table">
        <thead>
            <tr>
                <th><a href="/pdf/NORMAL USES.pdf" target="_blank">Normal Diet (USES)</a></th>
                <th><a href="/pdf/hypo uses.pdf" target="_blank">HYPO NORMAL Diet (USES)</a></th>
                <th><a target="_blank">OTHER</a></th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>
                    <div th:each="option : ${normalDietOptions}" class="form-check">
                        <input type="checkbox" class="form-check-input" th:value="${option.value}" onchange="updateDietOrder(this)"/> 
                        <span th:text="${option.name}">Option Name</span>
                    </div>
                </td>
                <td>
                    <div th:each="option : ${hypoDietOptions}" class="form-check">
                        <input type="checkbox" class="form-check-input" th:value="${option.value}" onchange="updateDietOrder(this)"/> 
                        <span th:text="${option.name}">Option Name</span>
                    </div>
                </td>
                <td>
                    <div th:each="option : ${otherDietOptions}" class="form-check">
                        <input type="checkbox" class="form-check-input" th:value="${option.value}" onchange="updateDietOrder(this)"/> 
                        <span th:text="${option.name}">Option Name</span>
                    </div>
                </td>
            </tr>
        </tbody>
        <tfoot>
            <tr>
                <td colspan="3">
                    <div class="diet-suggestions">
                        <a th:each="suggestion : ${dietSuggestions}" th:href="${suggestion.pdfLink}" target="_blank" th:text="${suggestion.name}">Suggestion Name</a>
                    </div>
                </td>
            </tr>
        </tfoot>
    </table>
</div>

</body>
</html>
