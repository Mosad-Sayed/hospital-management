<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Patient Filter</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        body {
            font-family: 'Cairo', sans-serif;
            background-color: #f9f9f9;
            color: #333;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .header-info, .form-container {
            background-color: #ffffff;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            padding: 20px;
            margin-top: 20px;
            border-radius: 8px;
            width: 90%;
            max-width: 600px;
            text-align: center;
        }

        .header-info {
            display: flex;
            justify-content: center;
            gap: 15px;
            font-size: 1.1em;
            font-weight: bold;
            color: #333;
        }

        .form-container h2 {
            font-size: 1.5em;
            color: #333;
            margin-bottom: 20px;
        }

        .checkbox-group, .department-select {
            margin: 15px 0;
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
        }

        .checkbox-group label, .department-select label {
            font-weight: bold;
            margin-right: 10px;
            cursor: pointer;
        }

        .btn {
            background-color: #007bff;
            color: #fff;
            border: none;
            padding: 10px 20px;
            font-size: 16px;
            border-radius: 5px;
            cursor: pointer;
            transition: background-color 0.3s;
            margin-top: 15px;
        }

        .btn:hover {
            background-color: #0056b3;
        }

        .table-container {
            width: 90%;
            max-width: 1000px;
            margin-top: 20px;
            overflow-x: auto;
        }

        .table {
            width: 100%;
            font-size: 16px;
            border-collapse: collapse;
            margin: 0 auto;
            border: 2px solid #000;
            background-color: #ffffff;
            text-align: center;
        }

        .table th, .table td {
            border: 1px solid #000;
            padding: 12px;
            text-align: center;
            font-weight: bold;
            color: #000;
        }

        .table th {
            background-color: #007bff;
            color: white;
            font-weight: bold;
        }

        .table tr:nth-child(even) {
            background-color: #f2f2f2;
        }

        .summary {
            margin-top: 15px;
            font-size: 1.2em;
            font-weight: bold;
            color: #333;
        }

        .action-buttons {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-top: 20px;
        }

        .checkbox-container {
            display: flex;
            justify-content: center;
            gap: 10px;
        }

        /* إعدادات الطباعة */
        @media print {
            /* إخفاء العناصر غير المرغوب فيها أثناء الطباعة */
            .header-info, .action-buttons, .form-container, .summary, .search-container {
                display: none;
            }

            /* إعدادات الطباعة */
            body {
                margin: 0;
                padding: 0;
                font-family: 'Cairo', sans-serif;
            }
            
            .print-container {
                width: 100%;
                padding: 10px;
            }
            
            .print-header {
                display: flex;
                justify-content: space-between;
                margin-bottom: 15px;
                font-weight: bold;
                font-size: 14px;
            }
            
            .table-container {
                width: 100%;
                margin: 0;
                padding: 0;
            }

            .table {
                width: 100%;
                font-size: 12px;
                border-collapse: collapse;
                font-weight: bold;
                color: #000;
            }

            .table th, .table td {
                border: 1px solid #000;
                padding: 8px;
                text-align: center;
                font-weight: bold;
                height: 20px;
            }

            .table th {
                background-color: #ffffff;
                color: #000;
                font-weight: bold;
            }
            
            .signatures {
                display: flex;
                justify-content: space-around;
                margin-top: 40px;
                width: 100%;
            }
            
            .signature-box {
                text-align: center;
                width: 200px;
                border-top: 1px solid #000;
                padding-top: 5px;
                margin-top: 30px;
            }

            /* إعداد صفحة الطباعة */
            @page {
                size: A4 landscape;
                margin: 10mm;
            }
        }
    </style>
    <script>
        function getFormattedDate() {
            const date = new Date();
            return date.toLocaleDateString('en-GB', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
        }

        function getPatternFeedDescription(patternFeed) {
            switch (patternFeed) {
                case 'N': return 'Normal';
                case 'C': return 'Child';
                case 'S': return 'Special';
                case 'NF': return 'Other';
                default: return 'All';
            }
        }

        function updateHeaderInfo() {
            const patternFeed = document.querySelector('input[name="patternFeed"]:checked').value;
            const department = document.querySelector('select[name="department"]').value;
            const date = getFormattedDate();
            const patternFeedDescription = getPatternFeedDescription(patternFeed);

            document.getElementById("headerDate").innerText = `Date: ${date}`;
            document.getElementById("headerDepartment").innerText = `Department: ${department}`;
            document.getElementById("headerPatternFeed").innerText = `Pattern Feeds: ${patternFeedDescription}`;
        }

        function filterPatients() {
            updateHeaderInfo();
            const patternFeeds = document.querySelector('input[name="patternFeed"]:checked').value;
            const registeredByDepartment = document.querySelector('select[name="department"]').value;

            fetch(`/patients/filteres?patternFeeds=${patternFeeds}&registeredByDepartment=${registeredByDepartment}`)
                .then(response => response.json())
                .then(data => {
                    const tableBody = document.getElementById("patientTableBody");
                    tableBody.innerHTML = "";

                    let totalPatients = 0;
                    let totalCompanions = 0;

                    data.forEach((patient, index) => {
                        totalPatients++;
                        if (patient.companionName) totalCompanions++;

                        const row = `<tr>
                            <td>${index + 1}</td>
                            <td>${patient.nameOfPatient || ''}</td>
                            <td>${patient.age || ''}</td>
                            <td>${patient.room || ''}</td>
                            <td>${patient.bed || ''}</td>
                            <td>${patient.dietOrder || ''}</td>
                            <td>${patient.notes || ''}</td>
                            <td>${patient.companionName || ''}</td>
                            <td>
                                <div class="checkbox-container">
                                    <label><input type="checkbox" name="ate_${index}" value="yes"> Yes</label>
                                    <label><input type="checkbox" name="ate_${index}" value="no"> No</label>
                                </div>
                            </td>
                            <td><input type="text" name="notes_${index}" style="width: 100%; border: none; text-align: center;"></td>
                        </tr>`;
                        tableBody.innerHTML += row;
                    });

                    document.getElementById("totalPatientsCount").innerText = totalPatients;
                    document.getElementById("totalCompanionsCount").innerText = totalCompanions;
                });
        }

        function printTable() {
            updateHeaderInfo();

            const currentDate = new Date().toLocaleDateString('en-GB', {
                weekday: 'long',
                year: 'numeric',
                month: 'long',
                day: 'numeric',
            });

            const printContents = `
                <div class="print-container">
                    <div class="print-header">
                        <div>${document.getElementById("headerDepartment").innerText}</div>
                        <div>${document.getElementById("headerPatternFeed").innerText}</div>
                        <div>Date: ${currentDate}</div>
                    </div>
                    ${document.querySelector(".table-container").outerHTML}
                    <div class="signatures">
                        <div class="signature-box">Dietician Signature</div>
                        <div class="signature-box">Food Server Signature</div>
                    </div>
                </div>
            `;

            const originalContents = document.body.innerHTML;
            document.body.innerHTML = printContents;
            window.print();
            document.body.innerHTML = originalContents;
            location.reload();
        }

        function filterTable() {
            const input = document.getElementById("searchInput");
            const filter = input.value.toUpperCase();
            const table = document.getElementById("patientTableBody");
            const rows = table.getElementsByTagName("tr");

            let totalPatients = 0;
            let totalCompanions = 0;

            for (let i = 0; i < rows.length; i++) {
                const cells = rows[i].getElementsByTagName("td");
                let shouldShow = false;

                for (let j = 0; j < cells.length; j++) {
                    const cell = cells[j];
                    if (cell) {
                        const textValue = cell.textContent || cell.innerText;
                        if (textValue.toUpperCase().indexOf(filter) > -1) {
                            shouldShow = true;
                            break;
                        }
                    }
                }

                if (shouldShow) {
                    rows[i].style.display = "";
                    totalPatients++;

                    const companionCell = rows[i].getElementsByTagName("td")[7];
                    if (companionCell && companionCell.textContent.trim() !== "") {
                        totalCompanions++;
                    }
                } else {
                    rows[i].style.display = "none";
                }
            }

            document.getElementById("totalPatientsCount").innerText = totalPatients;
            document.getElementById("totalCompanionsCount").innerText = totalCompanions;
        }
    </script>
</head>
<body>

<div class="header-info">
    <p id="headerDate">Date: </p>
    <p id="headerDepartment">Section: </p>
    <p id="headerPatternFeed">Pattern Feed: </p>
</div>

<div class="form-container">
    <h2><i class="fas fa-filter"></i> Patient Filter</h2>
    <div class="checkbox-group">
        <label><input type="radio" name="patternFeed" value="All" checked> All</label>
        <label><input type="radio" name="patternFeed" value="N"> N</label>
        <label><input type="radio" name="patternFeed" value="C"> C</label>
        <label><input type="radio" name="patternFeed" value="S"> S</label>
        <label><input type="radio" name="patternFeed" value="NF"> NF</label>
    </div>

    <div class="department-select">
        <label>Department:</label>
        <select name="department">
            <option value="All">All</option>
            <option value="PEDIATRICS">Pediatrics</option>
            <option value="NURSERY">Nursery</option>
            <option value="DIETARY">Dietary</option>
            <option value="MS">MS</option>
            <option value="MM">MM</option>
            <option value="ICU">ICU</option>
            <option value="CCU">CCU</option>
            <option value="OB">OB</option>
            <option value="AKU1">AKU1</option>
            <option value="AKU2">AKU2</option>
            <option value="FS">FS</option>
            <option value="FM">FM</option>
        </select>
    </div>

    <button type="button" class="btn" onclick="filterPatients()">Filter <i class="fas fa-search"></i></button>
</div>

<div class="search-container" style="margin-top: 20px;">
    <input type="text" id="searchInput" oninput="filterTable()" placeholder="Search in the table..." style="padding: 10px; width: 300px; border-radius: 5px; border: 1px solid #ccc;">
</div>

<div class="table-container">
    <table class="table">
        <thead>
            <tr>
                <th>#</th>
                <th>Name</th>
                <th>Age</th>
                <th>Room</th>
                <th>Bed</th>
                <th>Diet Order</th>
                <th>Notes</th>
                <th>Companion Name</th>
                <th>Ate?</th>
                <th>Additional Notes</th>
            </tr>
        </thead>
        <tbody id="patientTableBody">
            <!-- سيتم ملء البيانات هنا باستخدام JavaScript -->
        </tbody>
        <tfoot>
            <tr>
                <td colspan="3" style="font-weight: bold;">Total Patients</td>
                <td colspan="2" id="totalPatientsCount">0</td>
                <td colspan="2" style="font-weight: bold;">Total Companions</td>
                <td colspan="4" id="totalCompanionsCount">0</td>
            </tr>
        </tfoot>
    </table>
</div>

<div class="summary" id="totalPatients">Total Patients: 0</div>

<div class="action-buttons">
    <button type="button" class="btn" onclick="printTable()">Print <i class="fas fa-print"></i></button>
    <button type="button" class="btn btn-back" onclick="window.history.back()">Back <i class="fas fa-arrow-left"></i></button>
</div>

</body>
</html>
