<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Patient Update Log</title>
	<link rel="stylesheet" href="/assets/css/bootstrap.min.css">
	       <link rel="stylesheet" href="/assets/css/all.min.css">
		   <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500&display=swap">
    <style>
        body {
            font-family: 'Roboto', sans-serif;
            background: linear-gradient(135deg, #f3f4f6, #e2e8f0);
            color: #333;
        }

        .fade-in {
            animation: fadeIn 1s ease-in;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .container {
            background-color: #ffffff;
            padding: 2rem;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        }

        table.table th,
        table.table td {
            text-align: center;
            vertical-align: middle;
        }
		.table th {
						    position: sticky; /* تثبيت رأس الجدول */
						    top: 0; /* يثبت الرأس عند أعلى الجدول */
						    background-color: #004d40; /* لون الخلفية لرأس الجدول */
						    color: white; /* لون النص */
						    z-index: 1; /* يضمن أن الرأس يظل فوق باقي الجدول */
							white-space: nowrap; /* منع تجاوز النص */

						}

        .table-hover tbody tr:hover {
            background-color: #f1f1f1;
        }

        .table thead th {
            background-color: #343a40;
            color: white;
            font-weight: 500;
        }

        .btn-primary {
            background-color: #007bff;
            border-color: #007bff;
        }

        .btn-primary:hover {
            background-color: #0056b3;
            border-color: #004085;
        }

        .search-container {
            position: relative;
        }

        .search-container input {
            padding-right: 40px;
        }

        .search-container .search-icon {
            position: absolute;
            top: 50%;
            right: 10px;
            transform: translateY(-50%);
            color: #007bff;
        }
        @media print {
     #searchInput,
    .btn, 
    .search-container, 
    .restore-button, 
    .navbar, /* افتراضياً إذا كان هناك شريط تنقل */
    .footer { /* افتراضياً إذا كان هناك تذييل */
        display: none !important;
    }
	.table th {
	       background-color: #d3d3d3  !important; /* لون خلفية الرأس عند الطباعة */
	       color: black !important; /* لون نص الرأس عند الطباعة */
	       text-align: center;
	       vertical-align: middle;
	       padding: 15px 10px;
	       white-space: nowrap;
		 position: static; /* إلغاء التثبيت للطباعة */

	       }
}

     .button-group {
            display: inline-block;
            margin-bottom: 20px; /* يمكنك تعديل المسافة حسب الحاجة */
        }
        .button-group button {
            margin-right: 10px; /* إضافة مسافة بين الزرين */
        }
    </style>
</head>
<body>
    <div class="container mt-5 fade-in">
        <h2 class="mb-4 text-center">Patient Update Log</h2>
        <div class="d-flex justify-content-between mb-3 search-container">
            <input id="searchInput" type="text" class="form-control w-50" placeholder="Search by username, department, or file no...">
        </div>
         <div class="button-group">
    <button class="btn btn-primary" onclick="window.history.back()"><i class="fas fa-arrow-left"></i> Back
</button>
    <button class="btn btn-primary" onclick="window.print()"><i class="fas fa-print"></i> Print
</button>
</div>
        <table class="table table-hover table-bordered">
            <thead class="thead-dark">
                <tr>
                    <th>#</th>
                    <th>Username</th>
                    <th>Department</th>
                    <th>Update Time</th>
                    <th>Patient File No</th>
                    <th>Changes</th>
                </tr>
            </thead>
            <tbody id="updateLogTable">
                <tr th:each="log : ${updateLogs}">
                    <td></td>
                    <td th:text="${log.username}"></td>
                    <td th:text="${log.department}"></td>
                    <td th:text="${log.updateTime}"></td>
                    <td th:text="${log.patientFileNo}"></td>
                    <td th:text="${log.changes}"></td>
                </tr>
            </tbody>
        </table>
    </div>

    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    <script>
        $(document).ready(function(){
            $("#searchInput").on("keyup", function() {
                var value = $(this).val().toLowerCase();
                $("#updateLogTable tr").filter(function() {
                    $(this).toggle($(this).text().toLowerCase().indexOf(value) > -1)
                });
            });
        });
    </script>
    <script>
document.addEventListener("DOMContentLoaded", function() {
    var table = document.getElementById("updateLogTable");
    var rows = table.querySelectorAll("tbody tr");
    rows.forEach(function(row, index) {
        var serialNoCell = row.querySelector("td:first-child");
        serialNoCell.textContent = index + 1;
    });
});
</script>
</body>
</html>
