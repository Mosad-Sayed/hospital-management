<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hospital Management System - Login</title>
    <link rel="stylesheet" href="/assets/css/bootstrap.min.css">
    <link rel="stylesheet" href="/assets/css/all.min.css">
    <style>
        :root {
            --primary-color: #0062E6;
            --secondary-color: #33AEFF;
            --success-color: #00C851;
            --light-green: #7ccaa3;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
            background: url('https://images.unsplash.com/photo-1579684385127-1ef15d508118?ixlib=rb-1.2.1&auto=format&fit=crop&w=1950&q=80') no-repeat center center fixed;
            background-size: cover;
        }
        
        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 98, 230, 0.85);
            z-index: 0;
        }
        
        body.green-theme::before {
            background: rgba(0, 200, 81, 0.85);
        }

        .login-container {
            max-width: 420px;
            background: rgba(255, 255, 255, 0.95);
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
            position: relative;
            z-index: 1;
            transform: translateY(0);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        
        .login-container:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
        }

        .logo {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .logo-icon {
            font-size: 70px;
            color: var(--primary-color);
            margin-bottom: 15px;
            transition: all 0.3s ease;
        }
        
        .green-theme .logo-icon {
            color: var(--success-color);
        }
        
        .logo-text {
            font-size: 24px;
            font-weight: 700;
            color: #333;
            margin-bottom: 5px;
            letter-spacing: 1px;
        }
        
        .logo-subtext {
            font-size: 14px;
            color: #666;
            font-weight: 500;
        }

        .form-control {
            border-radius: 30px;
            padding: 15px 20px;
            border: 1px solid #e0e0e0;
            transition: all 0.3s ease;
            background-color: rgba(255, 255, 255, 0.8);
        }
        
        .form-control:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 0 0.2rem rgba(0, 98, 230, 0.25);
        }
        
        .green-theme .form-control:focus {
            border-color: var(--success-color);
            box-shadow: 0 0 0 0.2rem rgba(0, 200, 81, 0.25);
        }

        .btn-login {
            background-color: var(--primary-color);
            border: none;
            border-radius: 30px;
            padding: 12px 30px;
            font-weight: 600;
            letter-spacing: 0.5px;
            transition: all 0.3s ease;
            width: 100%;
            margin-top: 10px;
        }
        
        .green-theme .btn-login {
            background-color: var(--success-color);
        }
        
        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        }
        
        .btn-back {
            background-color: transparent;
            border: 1px solid #ddd;
            color: #666;
            border-radius: 30px;
            padding: 12px 30px;
            font-weight: 600;
            transition: all 0.3s ease;
            width: 100%;
        }
        
        .btn-back:hover {
            background-color: #f8f9fa;
            color: #333;
        }

        .spinner-border {
            width: 3rem;
            height: 3rem;
            display: none;
            margin: 20px auto;
            color: var(--primary-color);
            animation: spin 1s linear infinite;
        }
        
        .green-theme .spinner-border {
            color: var(--success-color);
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .form-group label {
            font-weight: 600;
            color: #555;
            margin-bottom: 8px;
            display: block;
        }

        .form-footer {
            margin-top: 25px;
            text-align: center;
            font-size: 14px;
            color: #666;
        }
        
        .form-footer a {
            color: var(--primary-color);
            font-weight: 600;
            text-decoration: none;
            transition: color 0.3s ease;
        }
        
        .green-theme .form-footer a {
            color: var(--success-color);
        }
        
        .form-footer a:hover {
            text-decoration: underline;
        }

        .alert-custom {
            position: fixed;
            top: 30px;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            max-width: 500px;
            z-index: 1000;
            text-align: center;
            font-weight: 600;
            font-size: 16px;
            border-radius: 30px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
            opacity: 0.95;
        }
        
        .particles {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            overflow: hidden;
        }
        
        .particle {
            position: absolute;
            background-color: rgba(255, 255, 255, 0.6);
            border-radius: 50%;
            animation: float linear infinite;
        }
        
        @keyframes float {
            0% { transform: translateY(0) rotate(0deg); opacity: 1; }
            100% { transform: translateY(-1000px) rotate(720deg); opacity: 0; }
        }
        
        /* Responsive adjustments */
        @media (max-width: 576px) {
            .login-container {
                padding: 30px 20px;
                margin: 0 15px;
            }
            
            .logo-icon {
                font-size: 60px;
            }
            
            .logo-text {
                font-size: 20px;
            }
        }
    </style>
</head>
<body>
    <!-- Particles Background -->
    <div class="particles" id="particles"></div>
    
    <!-- Error Message Alert -->
    <div th:if="${errorMessage}" class="alert alert-warning alert-custom" role="alert">
        <span th:text="${errorMessage}"></span>
    </div>
    
    <div class="login-container">
        <div class="logo">
            <i class="fas fa-hospital logo-icon"></i>
            <div class="logo-text">Hospital Management</div>
            <div class="logo-subtext">Secure Login Portal</div>
        </div>
        
        <form th:action="@{/patients/login}" method="post" id="loginForm" onsubmit="showProgress(event)">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" class="form-control" id="username" name="username" placeholder="Enter your username" required oninput="fetchDepartment()">
            </div>
            
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" class="form-control" id="password" name="password" placeholder="Enter your password" required>
            </div>
            
            <div class="form-group">
                <label for="department">Department</label>
                <input type="text" class="form-control" id="department" name="department" readonly>
            </div>
            
            <div class="form-group d-flex gap-3">
                <button type="button" class="btn btn-back" onclick="window.history.back()">
                    <i class="fas fa-arrow-left"></i> Back
                </button>
                <button type="submit" class="btn btn-login">
                    <i class="fas fa-sign-in-alt"></i> Login
                </button>
            </div>
        </form>
        
        <div class="spinner-border" id="spinner" role="status">
            <span class="sr-only">Loading...</span>
        </div>
        
        <div class="form-footer">
            <p>Forgot your password? <a th:href="@{/forgot-password}">Reset it here</a></p>
            <p>Don't have an account? <a th:href="@{/patients/register}">Request access</a></p>
        </div>
        
        <div th:if="${message != null}" class="alert alert-danger mt-3" role="alert">
            <span th:text="${message}"></span>
        </div>
    </div>
    
    <script>
        // Create floating particles
        function createParticles() {
            const particlesContainer = document.getElementById('particles');
            const particleCount = window.innerWidth < 576 ? 20 : 30;
            
            for (let i = 0; i < particleCount; i++) {
                const particle = document.createElement('div');
                particle.classList.add('particle');
                
                // Random size between 5px and 15px
                const size = Math.random() * 10 + 5;
                particle.style.width = `${size}px`;
                particle.style.height = `${size}px`;
                
                // Random position
                particle.style.left = `${Math.random() * 100}%`;
                particle.style.top = `${Math.random() * 100}%`;
                
                // Random animation duration between 10s and 20s
                const duration = Math.random() * 10 + 10;
                particle.style.animationDuration = `${duration}s`;
                
                // Random delay
                particle.style.animationDelay = `${Math.random() * 5}s`;
                
                particlesContainer.appendChild(particle);
            }
        }
        
        // Set theme based on department
        function setTheme() {
            const params = new URLSearchParams(window.location.search);
            const department = params.get('department');
            
            if (department === 'dietary') {
                document.body.classList.add('green-theme');
            }
        }
        
        // Fetch department based on username
        function fetchDepartment() {
            const username = document.getElementById('username').value;
            if (username) {
                fetch(`/patients/getDepartment?username=${username}`)
                    .then(response => response.text())
                    .then(data => {
                        document.getElementById('department').value = data;
                        
                        // Update theme if dietary department
                        if (data.toLowerCase() === 'dietary') {
                            document.body.classList.add('green-theme');
                        } else {
                            document.body.classList.remove('green-theme');
                        }
                    });
            }
        }
        
        // Show loading spinner
        function showProgress(event) {
            event.preventDefault();
            document.getElementById('loginForm').style.display = 'none';
            document.getElementById('spinner').style.display = 'block';
            
            setTimeout(() => {
                document.getElementById('loginForm').submit();
            }, 1500);
        }
        
        // Initialize
        document.addEventListener('DOMContentLoaded', function() {
            createParticles();
            setTheme();
        });
    </script>
</body>
</html>
