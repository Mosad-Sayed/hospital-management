<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Special Diet Options</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-5">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1>Special Diet Options</h1>
        <a th:href="@{/diet-options}" class="btn btn-outline-secondary">Back to All Options</a>
    </div>
    
    <div class="card shadow">
        <div class="card-header bg-primary text-white">
            <h5 class="mb-0">SPECIAL Options</h5>
        </div>
        <div class="card-body">
            <div class="table-responsive">
                <table class="table table-hover">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Label</th>
                            <th>Value</th>
                            <th class="text-end">Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="option : ${specialOptions}">
                            <td th:text="${option.id}"></td>
                            <td th:text="${option.label}"></td>
                            <td th:text="${option.value}"></td>
                            <td class="text-end">
                                <a th:href="@{/diet-options/edit/{id}(id=${option.id})}" 
                                   class="btn btn-sm btn-warning me-2">Edit</a>
                                <a th:href="@{/diet-options/delete/{id}(id=${option.id})}" 
                                   class="btn btn-sm btn-danger"
                                   onclick="return confirm('Are you sure you want to delete this diet option?')">Delete</a>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
</body>
</html>
