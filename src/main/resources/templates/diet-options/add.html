<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Add Diet Option</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card shadow">
                <div class="card-header bg-dark text-white">
                    <h2 class="mb-0">Add New Diet Option</h2>
                </div>
                <div class="card-body">
                    <form th:action="@{/diet-options/add}" th:object="${dietOption}" method="post">
                        <div class="mb-3">
                            <label for="label" class="form-label">Label</label>
                            <input type="text" class="form-control" id="label" th:field="*{label}" required>
                        </div>
                        <div class="mb-3">
                            <label for="value" class="form-label">Value</label>
                            <input type="text" class="form-control" id="value" th:field="*{value}" required>
                        </div>
                        <div class="mb-4">
                            <label for="type" class="form-label">Type</label>
                            <select class="form-select" id="type" th:field="*{type}" required>
                                <option value="">Select Type</option>
                                <option value="SPECIAL">Special</option>
                                <option value="SPECIAL_HYPO">Special Hypo</option>
                                <option value="OTHER_SPECIAL">Other Special</option>
                            </select>
                        </div>
                        <div class="d-flex justify-content-end">
                            <a th:href="@{/diet-options}" class="btn btn-secondary me-2">Cancel</a>
                            <button type="submit" class="btn btn-primary">Save Diet Option</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
