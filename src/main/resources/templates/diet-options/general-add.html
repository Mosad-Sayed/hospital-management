<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Add General Option</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-5">
    <div class="card shadow">
        <div class="card-header bg-secondary text-white">
            <h2>Add New General Option</h2>
        </div>
        <div class="card-body">
            <form th:action="@{/diet-options/save}" th:object="${dietOption}" method="post">
                <input type="hidden" th:field="*{type}" value="OTHER_GENERAL">
                
                <div class="mb-3">
                    <label for="label" class="form-label">Label</label>
                    <input type="text" class="form-control" id="label" th:field="*{label}" required>
                </div>
                <div class="mb-3">
                    <label for="value" class="form-label">Value</label>
                    <input type="text" class="form-control" id="value" th:field="*{value}" required>
                </div>
                <div class="d-flex justify-content-end">
                    <a th:href="@{/diet-options/general}" class="btn btn-secondary me-2">Cancel</a>
                    <button type="submit" class="btn btn-primary">Save General Option</button>
                </div>
            </form>
        </div>
    </div>
</div>
</body>
</html>
